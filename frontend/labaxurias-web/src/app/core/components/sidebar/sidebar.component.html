<!-- Botão Hamburger (aparece apenas no mobile) -->
<button class="hamburger-btn" (click)="toggleMobileMenu()" [class.active]="isMobileMenuOpen">
  <span></span>
  <span></span>
  <span></span>
</button>

<!-- Overlay para fechar menu no mobile -->
@if (isMobileMenuOpen) {
  <div class="mobile-overlay" (click)="closeMobileMenu()"></div>
}

<nav class="sidebar" [class.mobile-open]="isMobileMenuOpen">
  <div class="logo-area">
    <div class="logo-icon">🔱</div>
    <div class="logo-text">
      <h2>T.U.C.U.C.J.</h2>
      <span class="subtitle">Painel de Controle</span>
    </div>
  </div>

  <ul class="menu-list">
    <li>
      <a routerLink="/gira" routerLinkActive="active" class="menu-item" (click)="closeMobileMenu()">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2C12 2 8 6 8 12C8 16 10 20 12 22C14 20 16 16 16 12C16 6 12 2 12 2Z"/>
            <path d="M12 12C12 12 10 14 10 16C10 18 12 20 12 20C12 20 14 18 14 16C14 14 12 12 12 12Z"/>
          </svg>
        </span>
        <span class="label">Gira</span>
      </a>
    </li>
    <li>
      <a routerLink="/atendimentos" routerLinkActive="active" class="menu-item" (click)="closeMobileMenu()">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 5H7C5.89543 5 5 5.89543 5 7V19C5 20.1046 5.89543 21 7 21H17C18.1046 21 19 20.1046 19 19V7C19 5.89543 18.1046 5 17 5H15"/>
            <path d="M9 5C9 3.89543 9.89543 3 11 3H13C14.1046 3 15 3.89543 15 5"/>
            <path d="M9 12H15"/>
            <path d="M9 16H15"/>
          </svg>
        </span>
        <span class="label">Atendimentos</span>
      </a>
    </li>
    <li>
      <a routerLink="/cadastros" routerLinkActive="active" class="menu-item" (click)="closeMobileMenu()">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <ellipse cx="12" cy="5" rx="9" ry="3"/>
            <path d="M3 5V19C3 20.6569 7.02944 22 12 22C16.9706 22 21 20.6569 21 19V5"/>
            <path d="M3 12C3 13.6569 7.02944 15 12 15C16.9706 15 21 13.6569 21 12"/>
          </svg>
        </span>
        <span class="label">Cadastros</span>
      </a>
    </li>
    <li>
      <a (click)="openExternal('/public'); closeMobileMenu()" class="menu-item external-link">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="15" rx="2" ry="2"/>
            <polyline points="17 2 12 7 7 2"/>
          </svg>
        </span>
        <span class="label">Painel de Chamada</span>
        <span class="external-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 17L17 7"/>
            <path d="M7 7H17V17"/>
          </svg>
        </span>
      </a>
    </li>
  </ul>

  <div class="sidebar-footer">
    <div class="user-info">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M20 21C20 16.5817 16.4183 13 12 13C7.58172 13 4 16.5817 4 21"/>
        </svg>
      </span>
      <span class="label">{{ username }}</span>
    </div>

    <a routerLink="/relatorios" routerLinkActive="active" class="menu-item" (click)="closeMobileMenu()">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </span>
      <span class="label">Relatórios</span>
    </a>

    <a (click)="openLogoutModal()" class="menu-item logout-btn">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </span>
      <span class="label">Sair</span>
    </a>
  </div>
</nav>

@if (showLogoutModal) {
  <div class="modal-overlay" (click)="closeLogoutModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>Confirmar Saída</h2>
        <button type="button" class="modal-close" (click)="closeLogoutModal()">×</button>
      </div>
      <div class="modal-body">
        <p class="confirm-text">Tem certeza que deseja sair do sistema?</p>
        <p class="confirm-warning">Você precisará fazer login novamente para acessar.</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-cancel" (click)="closeLogoutModal()">Cancelar</button>
        <button type="button" class="btn-danger" (click)="confirmLogout()">Sair</button>
      </div>
    </div>
  </div>
}
