<mat-card class="attendance-card">
  <mat-card-header>
    <mat-card-title>{{ guideName }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <p>Na fila: {{ queue.length }}</p>

    @if (queue.length === 0) {
      <p>Nenhum cliente aguardando.</p>
    } @else {
      <ul>
        @for (item of queue; track item.id) {
          <li>{{ item.clientName }}</li>
        }
      </ul>
    }
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-flat-button color="primary" type="button" (click)="callNext.emit()">
      <mat-icon>call</mat-icon>
      Chamar próximo
    </button>
  </mat-card-actions>
</mat-card>
