<mat-card class="attendance-card">

    <mat-card-header>

        <mat-card-title>
            🌿 {{ guideName }}
        </mat-card-title>

        <mat-card-subtitle>
            {{ queue.length }} pessoa(s) aguardando
        </mat-card-subtitle>

    </mat-card-header>

    <mat-card-content>

        @if(queue.length === 0){

            <p>Nenhuma pessoa aguardando.</p>

        }

        @else {

            <ul>

                @for(item of queue; track item.id){

                    <li>{{ item.clientName }}</li>

                }

            </ul>

        }

    </mat-card-content>

    <mat-card-actions>

        <button
            mat-raised-button
            color="primary"
            (click)="callNext.emit()">

            Chamar Próximo

        </button>

    </mat-card-actions>

</mat-card>
