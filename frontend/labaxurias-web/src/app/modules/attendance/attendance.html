<h1 class="title">

    Painel de Atendimento

</h1>

<div class="cards">

    <app-attendance-card
        *ngFor="let guide of guides; trackBy: trackByGuideId"
        [guideName]="guide.name"
        [queue]="guide.queue || []"
        (callNext)="callNext(guide.id)">
    </app-attendance-card>

</div>
