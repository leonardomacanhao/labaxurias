<div class="screen">
  <app-header-info></app-header-info>

  @if (currentAttendance) {
    <app-attendance-panel
      [currentAttendance]="currentAttendance"
      [nextInQueue]="nextInQueue">
    </app-attendance-panel>
  } @else {
    <div class="waiting-screen">
      <div class="logo-container">
        <img src="logo-tucucj-transparent.png" alt="T.U.C.U.C.J." class="img-circular logo-image">
        <div class="logo-text" data-text="T.U.C.U.C.J.">T.U.C.U.C.J.</div>
      </div>
    </div>
  }
</div>
